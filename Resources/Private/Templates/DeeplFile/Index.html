<f:form action="index" method="post" enctype="multipart/form-data" id="deeplFileForm" class="ppl-deepl-form">
    <div
        id="deeplTranslationRoot"
        class="ppl-deepl-frontend ppl-deepl-frontend--file"
        data-label-no-glossary="{f:translate(key: 'LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:option.noGlossary')}"
        data-label-glossary-available="{f:translate(key: 'LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:hint.glossaryAvailable')}"
        data-label-no-glossary-hint="{f:translate(key: 'LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:hint.noGlossary')}"
        data-message-same-language="{f:translate(key: 'LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:message.sameLanguage')}"
    >
        <script type="application/json" id="pplDeeplFrontendFileData"><f:format.raw>{frontendControlDataJson}</f:format.raw></script>
        <f:format.raw>{frontendAccessHeader}</f:format.raw>

        <div class="ppl-deepl-page-head">
            <div class="ppl-deepl-page-head__icon" aria-hidden="true"></div>
            <div class="ppl-deepl-page-head__content">
                <h2><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.title.v3" /></h2>
                <p><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.intro" /></p>
            </div>
        </div>

        <div class="ppl-deepl-layout ppl-deepl-layout--single">
            <section class="ppl-deepl-card">
                <div class="ppl-deepl-card__head">
                    <strong><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.settingsCard" /></strong>
                </div>
                <div class="ppl-deepl-card__body">
                    <div class="ppl-deepl-grid">
                        <div class="ppl-deepl-field">
                            <label for="file_language_source"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:field.sourceLanguage" /></label>
                            <f:form.select name="language_source" id="file_language_source" options="{sourceLanguages}" value="{language_source}" />
                        </div>

                        <div class="ppl-deepl-field">
                            <label for="file_language_ziel"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:field.targetLanguage" /></label>
                            <f:form.select name="language_ziel" id="file_language_ziel" options="{targetLanguages}" value="{language_ziel}" />
                        </div>
                    </div>

                    <div id="fileLanguageWarning" class="ppl-deepl-alert ppl-deepl-section" hidden="hidden">
                        <f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:message.sameLanguage" />
                    </div>

                    <div class="ppl-deepl-field ppl-deepl-section">
                        <label for="file_glossary_id"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:field.glossary" /></label>
                        <f:form.select
                            name="glossary_id"
                            id="file_glossary_id"
                            options="{glossaryOptions}"
                            value="{glossary_id}"
                            prependOptionLabel="{f:translate(key: 'LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:option.noGlossary')}"
                            prependOptionValue=""
                        />
                        <span id="fileGlossaryStatus" class="ppl-deepl-muted">
                            <f:if condition="{glossaryAvailable}">
                                <f:then><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:hint.glossaryAvailable" /></f:then>
                                <f:else><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:hint.noGlossary" /></f:else>
                            </f:if>
                        </span>
                    </div>

                    <div class="ppl-deepl-section">
                        <div class="ppl-deepl-label"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.choose" /></div>
                        <p class="ppl-deepl-muted"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.allowedFormats" /></p>
                        <label for="userfile" class="ppl-deepl-file-drop">
                            <f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.choose" />
                        </label>
                        <f:form.upload name="userfile" id="userfile" class="ppl-deepl-hidden-file" />

                        <div id="selectedFileBox" class="ppl-deepl-file-box ppl-deepl-section">
                            <div>
                                <div class="ppl-deepl-muted"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.selected" /></div>
                                <div id="selectedFileName" class="ppl-deepl-file-name"></div>
                            </div>
                            <button type="button" id="removeSelectedFileButton" class="ppl-deepl-button ppl-deepl-button--danger" aria-label="{f:translate(key: 'LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.remove')}" title="{f:translate(key: 'LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.remove')}">
                                x
                            </button>
                        </div>
                    </div>

                    <div class="ppl-deepl-section">
                        <div class="ppl-deepl-label"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.translated" /></div>
                        <div id="translatedFileBox" class="ppl-deepl-file-box is-visible">
                            <div>
                                <div class="ppl-deepl-muted"><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.status" /></div>
                                <div id="translatedFileName" class="ppl-deepl-file-name">
                                    <f:if condition="{translatedFileName}">
                                        <f:then>{translatedFileName}</f:then>
                                        <f:else><f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.none" /></f:else>
                                    </f:if>
                                </div>
                            </div>

                            <f:if condition="{translatedFilePath}">
                                <f:then>
                                    <a id="downloadTranslatedFileButton" class="ppl-deepl-button ppl-deepl-button--success" href="{translatedFilePath}" download>
                                        <f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.downloadNamed" arguments="{0: translatedFileName}" />
                                    </a>
                                </f:then>
                                <f:else>
                                    <button type="button" id="downloadTranslatedFileButton" class="ppl-deepl-button ppl-deepl-button--secondary" disabled="disabled">
                                        <f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.download" />
                                    </button>
                                </f:else>
                            </f:if>
                        </div>
                    </div>

                    <div class="ppl-deepl-actions">
                        <button type="submit" id="translateFileButton" class="ppl-deepl-button ppl-deepl-button--primary" disabled="disabled">
                            <f:translate key="LLL:EXT:ppl_deepl_v3_translate/Resources/Private/Language/locallang.xlf:file.translate" />
                        </button>
                    </div>

                    <f:if condition="{errorMessage}">
                        <div id="fileErrorMessage" class="ppl-deepl-alert ppl-deepl-section" data-role="deepl-server-error">{errorMessage}</div>
                    </f:if>
                </div>
            </section>
        </div>
    </div>
</f:form>
