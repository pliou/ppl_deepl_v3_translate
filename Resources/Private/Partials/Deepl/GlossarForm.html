
<f:if condition="{useGlossary}">
    <label for="glossary" class="mt-3">Glossarbegriffe eingeben (tab-separiert, ein Paar pro Zeile):</label>
    <f:form.textarea name="glossary"
                     value="{glossary}"
                     id="glossary"
                     rows="5"
                     class="form-control"
                     placeholder="Beispiel:\nHaus\tHouse\nAuto\tCar" />
</f:if>
